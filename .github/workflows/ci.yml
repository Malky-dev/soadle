name: ci

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'fix/**'
      - 'bugfix/**'
      - 'chore/**'
  pull_request:
    branches:
      - develop

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Run tests
        run: php tests/run.php

  health:
    name: Health check
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p var/database

      - name: Run migrations
        run: php scripts/migrate.php

      - name: Start PHP server
        run: php -S 127.0.0.1:8000 -t public > /tmp/php-server.log 2>&1 &

      - name: Wait for server
        run: sleep 2

      - name: Call health endpoint
        run: curl --fail http://127.0.0.1:8000/health

      - name: Show server log on failure
        if: failure()
        run: cat /tmp/php-server.log