name: ci

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'fix/**'
      - 'bugfix/**'
      - 'chore/**'
  pull_request:
    branches:
      - develop

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Run tests
        run: php tests/run.php